<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>德州撲克</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("texasHoldemTheme");
          document.documentElement.dataset.theme = theme === "light" ? "light" : "dark";
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=hero-card-slim-v44" />
  </head>
  <body>
    <section id="desktopOnlyNotice" class="desktop-only-notice" aria-live="polite">
      <div>
        <p>No-limit Hold'em</p>
        <h1>桌機版體驗限定</h1>
        <span>目前先關閉手機版，請使用平板橫向或電腦開啟。</span>
      </div>
    </section>
    <main class="app-shell">
      <section class="table">
        <div class="top-bar">
          <div>
            <p class="eyebrow">No-limit Hold'em</p>
            <h1>德州撲克</h1>
            <p id="handNumber" class="hand-number">第 1 局</p>
          </div>
          <div class="top-bar-actions">
            <button id="muteButton" class="ghost-button tool-button" type="button">🔊 音效</button>
            <button id="themeButton" class="ghost-button tool-button theme-button" type="button" aria-pressed="false">☀ 明暗</button>
            <button id="autoNewHandButton" class="ghost-button auto-button" type="button">▶ 自動牌局</button>
            <button id="newHandButton" class="ghost-button" type="button">新牌局</button>
          </div>
        </div>

        <section id="arena" class="arena" aria-label="牌桌">
          <div class="table-light" aria-hidden="true"></div>
          <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
          <div id="showdownBanner" class="showdown-banner" aria-live="polite"></div>
          <div id="actionToast" class="action-toast" aria-live="polite">新牌局開始</div>
          <div class="table-corner-stats" aria-label="牌局狀態">
            <span><em>牌局</em><strong id="cornerHandValue">第 1 局</strong></span>
            <span><em>莊家</em><strong id="cornerDealerValue">--</strong></span>
            <span><em>盲注</em><strong id="cornerBlindsValue">10 / 20</strong></span>
          </div>
          <div id="opponents" class="opponents"></div>

          <section class="board-zone" aria-label="公共牌">
            <div class="pot-chip">
              <span>Pot</span>
              <strong id="tablePotValue">0</strong>
              <em id="potDelta" class="pot-delta"></em>
              <div id="potChips" class="pot-chips" aria-hidden="true"></div>
            </div>
            <div id="boardStageLabel" class="board-label stage-badge">PREFLOP</div>
            <div id="boardCards" class="cards board-cards"></div>
          </section>

          <section class="player-zone">
            <div id="playerTurnMarker" class="turn-marker">你的回合 <span></span></div>
            <div id="heroTableStack" class="table-chip-pile table-chip-pile-hero" aria-label="玩家底池貢獻">
              <span id="playerStackChips" class="mini-chip-stack table-chip-pile-stack" aria-hidden="true"></span>
              <span class="table-chip-pile-copy">
                <strong id="playerContributionValue">0</strong>
                <span>底池貢獻</span>
              </span>
            </div>
            <div class="player-panel">
              <div>
                <p class="seat-label">你的手牌</p>
                <h2 id="playerName">玩家</h2>
                <p id="playerHandRank" class="hand-rank">等待發牌</p>
              </div>
            </div>
            <div id="playerCards" class="cards player-cards"></div>
          </section>

          <div class="chip-rack" aria-hidden="true">
            <span class="chip chip-gold"></span>
            <span class="chip chip-red"></span>
            <span class="chip chip-cyan"></span>
            <span class="chip chip-blue"></span>
          </div>
        </section>

        <section class="controls" aria-label="動作">
          <button id="foldButton" type="button">棄牌</button>
          <button id="callButton" type="button">跟注</button>
          <button id="raiseButton" type="button">加注</button>
          <button id="allInButton" type="button">All-in</button>
          <label class="raise-control">
            <span class="raise-caption">加注額</span>
            <span class="range-shell">
              <input id="raiseAmount" type="range" min="20" max="200" step="10" value="60" />
            </span>
            <strong id="raiseAmountValue">60</strong>
          </label>
          <div class="quick-bets" aria-label="快捷下注">
            <button type="button" data-bet="third">1/3 Pot</button>
            <button type="button" data-bet="half">1/2 Pot</button>
            <button type="button" data-bet="pot">Pot</button>
            <button type="button" data-bet="allin">All-in</button>
          </div>
        </section>

        <section class="side-rail" aria-label="資訊側欄">
          <aside id="coachPanel" class="coach-panel" aria-label="Poker Coach">
            <div class="coach-header">
              <div>
                <p class="eyebrow">Poker Coach</p>
                <h2>撲克教練</h2>
              </div>
              <label class="coach-main-toggle">
                <input id="coachEnabled" type="checkbox" checked />
                <span>ON</span>
              </label>
            </div>

            <div class="coach-toggles" aria-label="教練功能">
              <label><input id="coachOddsToggle" type="checkbox" checked /> 勝率分析</label>
              <label><input id="coachAdviceToggle" type="checkbox" checked /> AI 教練</label>
            </div>

            <div id="coachContent" class="coach-content">
              <section class="coach-card" data-coach-card="odds">
                <div class="coach-card-title">
                  <span>勝率分析</span>
                  <strong id="coachWinRate">--%</strong>
                </div>
                <div class="coach-meter" aria-hidden="true"><span id="coachWinMeter"></span></div>
                <div class="coach-stats">
                  <span>Outs <strong id="coachOuts">--</strong></span>
                  <span>Pot Odds <strong id="coachPotOdds">--%</strong></span>
                  <span id="coachTrend">等待公共牌</span>
                </div>
              </section>

              <section class="coach-card coach-advice" data-coach-card="advice">
                <div class="coach-card-title">
                  <span>AI 教練</span>
                  <strong id="coachBestAction">--</strong>
                </div>
                <div id="coachStars" class="coach-stars">☆☆☆☆☆</div>
                <p id="coachAdviceText" class="coach-text">輪到你時會給出建議。</p>
              </section>
            </div>
          </aside>

          <aside id="historyPanel" class="log-panel" aria-label="牌局紀錄">
            <div class="log-header">
              <h2>牌局紀錄</h2>
            </div>
            <div id="gameLog" class="game-log"></div>
          </aside>
        </section>
      </section>
    </main>
    <script src="app.js?v=hero-card-slim-v44"></script>
  </body>
</html>
